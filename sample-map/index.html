<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experium Park Map — POC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }
    #info {
      position: absolute; top: 12px; left: 12px;
      color: #fff; font: 14px/1.4 system-ui;
      background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 6px;
    }
    #label {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: #fff; font: 16px/1.4 system-ui; background: rgba(0,0,0,0.7);
      padding: 8px 16px; border-radius: 6px; display: none;
    }
  </style>
</head>
<body>
  <div id="info">Drag to orbit · Scroll to zoom · Click landmarks</div>
  <div id="label"></div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 500);
    camera.position.set(0, 40, 50);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.maxPolarAngle = Math.PI / 2.5;
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    // Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(20, 40, 20);
    sun.castShadow = true;
    scene.add(sun);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(40, 32),
      new THREE.MeshLambertMaterial({ color: 0x4a7c3f })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Water body
    const pond = new THREE.Mesh(
      new THREE.CircleGeometry(5, 24),
      new THREE.MeshLambertMaterial({ color: 0x3498db })
    );
    pond.rotation.x = -Math.PI / 2;
    pond.position.set(-12, 0.05, 8);
    pond.userData = { name: 'Lake Serenity' };
    scene.add(pond);

    // Clickable objects
    const clickables = [];

    // Tree helper
    function makeTree(x, z, height = 3, name) {
      const group = new THREE.Group();
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.3, height * 0.4, 6),
        new THREE.MeshLambertMaterial({ color: 0x8b5e3c })
      );
      trunk.position.y = height * 0.2;
      trunk.castShadow = true;
      group.add(trunk);

      const foliage = new THREE.Mesh(
        new THREE.ConeGeometry(height * 0.5, height * 0.7, 6),
        new THREE.MeshLambertMaterial({ color: 0x2d6b2d })
      );
      foliage.position.y = height * 0.6;
      foliage.castShadow = true;
      group.add(foliage);

      group.position.set(x, 0, z);
      if (name) {
        group.userData = { name };
        clickables.push(foliage);
        foliage.userData = { name };
      }
      scene.add(group);
      return group;
    }

    // Notable trees (clickable)
    makeTree(8, -5, 4, 'Ancient Baobab');
    makeTree(-6, -12, 5, 'Giant Banyan');
    makeTree(15, 10, 3.5, 'Neem Grove');

    // Background trees (decorative)
    const treePositions = [
      [20, -15], [22, -8], [18, 5], [-20, -10], [-18, 5],
      [-25, 15], [25, 18], [-10, -20], [5, -22], [12, 20],
      [-15, 18], [28, -2], [-28, 8], [8, 25], [-22, -18]
    ];
    treePositions.forEach(([x, z]) => {
      makeTree(x, z, 2 + Math.random() * 2);
    });

    // Structures
    function makeStructure(x, z, w, h, d, color, name) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshLambertMaterial({ color })
      );
      mesh.position.set(x, h / 2, z);
      mesh.castShadow = true;
      mesh.userData = { name };
      clickables.push(mesh);
      scene.add(mesh);
      return mesh;
    }

    makeStructure(0, -8, 4, 3, 3, 0xd4a574, 'Stone Pavilion');
    makeStructure(-8, -18, 3, 2.5, 3, 0xc0392b, 'Heritage Temple');
    makeStructure(18, -12, 2.5, 4, 2.5, 0x7f8c8d, 'Observation Tower');

    // Roof for pavilion
    const roof = new THREE.Mesh(
      new THREE.ConeGeometry(3.5, 2, 4),
      new THREE.MeshLambertMaterial({ color: 0x8b4513 })
    );
    roof.position.set(0, 4, -8);
    roof.rotation.y = Math.PI / 4;
    scene.add(roof);

    // Trails
    function makeTrail(points, color = 0xd4a017) {
      const curve = new THREE.CatmullRomCurve3(
        points.map(p => new THREE.Vector3(p[0], 0.1, p[1]))
      );
      const geo = new THREE.TubeGeometry(curve, 40, 0.3, 6, false);
      const mat = new THREE.MeshLambertMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);
    }

    // Main trail loop
    makeTrail([
      [0, 15], [10, 10], [15, 0], [12, -10],
      [5, -15], [-5, -18], [-12, -12], [-15, -5],
      [-12, 5], [-5, 12], [0, 15]
    ]);

    // Side trail to pond
    makeTrail([[-12, -5], [-12, 5], [-12, 8]], 0xb8860b);

    // Side trail to tower
    makeTrail([[12, -10], [18, -12]], 0xb8860b);

    // Pond clickable area (invisible sphere for raycast)
    clickables.push(pond);

    // Raycaster for clicks
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const label = document.getElementById('label');

    renderer.domElement.addEventListener('click', (e) => {
      pointer.x = (e.clientX / innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickables);
      if (hits.length > 0) {
        const name = hits[0].object.userData.name;
        if (name) {
          label.textContent = name;
          label.style.display = 'block';
          setTimeout(() => label.style.display = 'none', 3000);
        }
      }
    });

    // Resize
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // Animate
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
